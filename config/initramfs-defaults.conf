# Default initramfs tool per distribution
# dracut: Fedora, OpenSUSE, RHEL
# mkinitramfs: Ubuntu, Debian, Deepin (initramfs-tools)
# mkinitcpio: Arch Linux

get_initramfs_default() {
    case "$1" in
        archlinux) echo "mkinitcpio" ;;
        ubuntu|debian|deepin) echo "mkinitramfs" ;;
        fedora|opensuse) echo "dracut" ;;
        *) echo "dracut" ;;
    esac
}
