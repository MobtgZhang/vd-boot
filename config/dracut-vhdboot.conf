# dracut configuration for vd-boot
# Used to build initramfs with kloop/vloop/squashfs support

# Required modules for VHD/VMDK/VDI/QCOW2/VHDX/SquashFS mounting
add_drivers+=" fuse dm-mod loop squashfs overlay "

# Required binaries
install_items+=" blkid losetup kpartx partx mount.fuse mount.ntfs-3g ntfs-3g shutdown lvm vgchange vgscan dmsetup "

# Omit unnecessary modules to reduce size
omit_dracutmodules+=" plymouth btrfs crypt "

# Do not include host-specific modules only
no_hostonly="yes"

# Force inclusion of all drivers
hostonly="no"
