# ========== SquashFS example ==========
# SquashFS is a read-only compressed filesystem
# System boots entirely into RAM with tmpfs overlay for writes
# All changes are lost on reboot (live-CD style)

menuentry 'Arch Linux SquashFS (RAM overlay)' --class arch --class gnu-linux {
    set vhddir="/vhd"
    set squashfile="$vhddir/arch.squashfs"
    search --no-floppy -f --set=root $squashfile
    probe -u --set=uuid ${root}

    linux $vhddir/vmlinuz root=UUID=${uuid} squashfs=$squashfile
    initrd $vhddir/initramfs-vhdboot.img
}

menuentry 'Ubuntu SquashFS (RAM overlay)' --class ubuntu --class gnu-linux {
    set vhddir="/vhd"
    set squashfile="$vhddir/ubuntu.squashfs"
    search --no-floppy -f --set=root $squashfile
    probe -u --set=uuid ${root}

