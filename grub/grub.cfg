# GRUB configuration sample - vd-boot
# Boot Linux from VHD/VMDK/VDI/QCOW2/VHDX/SquashFS files
# Supports UEFI and legacy BIOS
#
# Before use:
# 1. Place disk image, vmlinuz, initramfs-vhdboot.img on same partition (auto-copied to output dir during build)
# 2. Change vhdfile path to actual disk image location
# 3. Merge this file content into /boot/grub/grub.cfg or EFI partition equivalent

set timeout=5
set default=0

# Load required modules
insmod gzio
insmod part_gpt
insmod part_msdos
insmod ext2
insmod ntfs
insmod search
insmod probe
insmod linux
insmod initrd

# ========== kloop mode (VHD) ==========
# Supports fixed/dynamic VHD, partition and LVM can be specified
# vhddir: Directory containing VHD, vmlinuz, initramfs-vhdboot.img (auto-copied to output dir during build)

menuentry 'Arch Linux VHD (kloop)' --class arch --class gnu-linux {
    set vhddir="/vhd"
    set vhdfile="$vhddir/arch-kloop-dynamic.vhd"
    search --no-floppy -f --set=root $vhdfile
    probe -u --set=uuid ${root}

    linux $vhddir/vmlinuz root=UUID=${uuid} kloop=$vhdfile kroot=/dev/mapper/loop0p1
    initrd $vhddir/initramfs-vhdboot.img
}

menuentry 'Ubuntu VHD (kloop)' --class ubuntu --class gnu-linux {
    set vhddir="/vhd"
    set vhdfile="$vhddir/ubuntu-kloop-dynamic.vhd"
