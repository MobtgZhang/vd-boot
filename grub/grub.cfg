# ========== vloop mode ==========
# vlooppart: p1=first partition, p2=second, p3=third...

menuentry 'Arch Linux VHD (vloop)' --class arch --class gnu-linux {
    set vhddir="/vhd"
    set vhdfile="$vhddir/arch-vloop-dynamic.vhd"
    search --no-floppy -f --set=root $vhdfile
    probe -u --set=uuid ${root}

    linux $vhddir/vmlinuz root=UUID=${uuid} vloop=$vhdfile vlooppart=p1
    initrd $vhddir/initramfs-vhdboot.img
}

menuentry 'Ubuntu VHD (vloop)' --class ubuntu --class gnu-linux {
    set vhddir="/vhd"
    set vhdfile="$vhddir/ubuntu-vloop-dynamic.vhd"
    search --no-floppy -f --set=root $vhdfile
    probe -u --set=uuid ${root}

    linux $vhddir/vmlinuz root=UUID=${uuid} vloop=$vhdfile vlooppart=p1
    initrd $vhddir/initramfs-vhdboot.img
}

# ========== Fixed size VHD example ==========

menuentry 'Fedora VHD Fixed (kloop)' --class fedora --class gnu-linux {
    set vhddir="/vhd"
    set vhdfile="$vhddir/fedora-kloop-fixed.vhd"
    search --no-floppy -f --set=root $vhdfile
    probe -u --set=uuid ${root}

    linux $vhddir/vmlinuz root=UUID=${uuid} kloop=$vhdfile kroot=/dev/mapper/loop0p1
    initrd $vhddir/initramfs-vhdboot.img
}

# ========== LVM partition example ==========
# If VHD uses LVM, specify klvm and kroot

menuentry 'Arch Linux VHD (kloop+LVM)' --class arch --class gnu-linux {
    set vhddir="/vhd"
    set vhdfile="$vhddir/arch-lvm.vhd"
    search --no-floppy -f --set=root $vhdfile
    probe -u --set=uuid ${root}

    linux $vhddir/vmlinuz root=UUID=${uuid} kloop=$vhdfile kroot=/dev/mapper/vg0-root klvm=vg0
    initrd $vhddir/initramfs-vhdboot.img
}

# ========== Multi-partition example ==========
# When root is on second partition use kroot=/dev/mapper/loop0p2

menuentry 'Linux VHD Second Partition (kloop)' --class gnu-linux {
    set vhddir="/vhd"
    set vhdfile="$vhddir/linux.vhd"
    search --no-floppy -f --set=root $vhdfile
    probe -u --set=uuid ${root}

    linux $vhddir/vmlinuz root=UUID=${uuid} kloop=$vhdfile kroot=/dev/mapper/loop0p2
    initrd $vhddir/initramfs-vhdboot.img
}
